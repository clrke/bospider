<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Bospider — a fast Mega Man X-inspired reflex game</title>

  <!-- SEO -->
  <meta name="description" content="Bospider is a free browser reflex game inspired by the Bospider boss from Mega Man X. Read the descending grid, pick the safe column, and survive ever-faster rounds. Plays on desktop and mobile — no install." />
  <meta name="keywords" content="Bospider, Mega Man X, reflex game, browser game, web game, free online game, HTML5 game, spider game, arcade game, no install" />
  <meta name="author" content="clrke" />
  <meta name="theme-color" content="#0a0a0f" />
  <link rel="canonical" href="https://clrke.github.io/bospider/" />

  <!-- Open Graph (Facebook, Discord, LinkedIn, …) -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Bospider" />
  <meta property="og:title" content="Bospider — a fast Mega Man X-inspired reflex game" />
  <meta property="og:description" content="Read the descending grid, pick the safe column, survive faster and faster. Free, plays right in your browser." />
  <meta property="og:url" content="https://clrke.github.io/bospider/" />
  <meta property="og:image" content="https://clrke.github.io/bospider/og-image.png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="Bospider — a spider descends a neon grid of columns and bars" />

  <!-- Twitter / X -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Bospider — a fast Mega Man X-inspired reflex game" />
  <meta name="twitter:description" content="Read the descending grid, pick the safe column, survive faster and faster." />
  <meta name="twitter:image" content="https://clrke.github.io/bospider/og-image.png" />

  <!-- Structured data: helps search engines classify the page as a playable game -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Bospider",
    "url": "https://clrke.github.io/bospider/",
    "description": "A free browser reflex game inspired by the Bospider boss from Mega Man X. Read the descending grid, pick the safe column, and survive ever-faster rounds.",
    "genre": ["Arcade", "Reflex", "Puzzle"],
    "gamePlatform": ["Web browser", "Mobile"],
    "applicationCategory": "Game",
    "operatingSystem": "Any (modern web browser)",
    "image": "https://clrke.github.io/bospider/og-image.png",
    "author": { "@type": "Person", "name": "clrke" },
    "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" }
  }
  </script>

  <!-- Emoji favicon (no external asset) -->
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%F0%9F%95%B7%3C/text%3E%3C/svg%3E" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0f;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      min-height: 100dvh;
      user-select: none;
      -webkit-user-select: none;
      -webkit-tap-highlight-color: transparent;
      padding: 12px;
      touch-action: manipulation;
    }

    h1 {
      font-size: 1.4rem;
      letter-spacing: 0.2em;
      color: #ff4444;
      margin-bottom: 6px;
      text-transform: uppercase;
    }

    #info {
      font-size: 0.75rem;
      color: #666;
      margin-bottom: 20px;
      letter-spacing: 0.05em;
      text-align: center;
    }

    #arena {
      position: relative;
      width: 320px;
      height: 480px;
      background: #0f0f1a;
      border: 2px solid #222;
      border-radius: 4px;
      overflow: hidden;
      cursor: pointer;
      touch-action: none;   /* capture swipes; don't scroll the page */
    }

    /* Vertical column rails — the 10px strands the spider descends */
    .col-track {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 10px;
      background: #1c1c33;
      border-radius: 5px;
      transform: translateX(-50%);   /* centered on the column center */
      pointer-events: none;
    }

    .col-selector {
      position: absolute;
      top: 0;
      bottom: 0;
      width: 80px;
      background: rgba(255, 255, 100, 0.04);
      border-left: 1px solid rgba(255,255,100,0.1);
      border-right: 1px solid rgba(255,255,100,0.1);
      transition: left 0.08s ease;
      pointer-events: none;
    }

    .col-selector.safe  { background: rgba(100, 255, 100, 0.07); border-color: rgba(100,255,100,0.25); }
    .col-selector.danger{ background: rgba(255,  60,  60, 0.07); border-color: rgba(255,60,60,0.25); }

    .bar {
      position: absolute;
      height: 6px;
      width: 80px;
      background: #4488ff;
      border-radius: 3px;
      box-shadow: 0 0 8px #4488ff88;
    }

    /* Green glow tracing the spider's actual descent path (shown once it lands) */
    .path-trace {
      position: absolute;
      height: 4px;
      background: #44ff88;
      border-radius: 2px;
      box-shadow: 0 0 6px #44ff88, 0 0 14px #44ff8866;
      transform-origin: 0 50%;
      pointer-events: none;
      z-index: 5;
      opacity: 0;
      animation: traceIn 0.25s ease forwards;
    }
    @keyframes traceIn { from { opacity: 0; } to { opacity: 1; } }

    #spider {
      position: absolute;
      width: 36px;
      height: 36px;
      font-size: 28px;
      text-align: center;
      line-height: 36px;
      transform: translateX(-50%) rotate(180deg);   /* face downward as it descends */
      transition: none;
      z-index: 10;
      filter: drop-shadow(0 0 6px #ff4444);
    }

    .col-label {
      position: absolute;
      bottom: 6px;
      font-size: 0.65rem;
      color: #444;
      text-align: center;
      width: 80px;
    }

    /* Overlay (start / game over) */
    #overlay {
      position: absolute;
      inset: 0;
      background: rgba(8, 8, 14, 0.92);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      z-index: 50;
      padding: 20px;
      gap: 10px;
    }
    #overlay.hidden { display: none; }
    #overlay .big { font-size: 1.6rem; color: #ff4444; letter-spacing: 0.15em; text-transform: uppercase; }
    #overlay .sub { font-size: 0.8rem; color: #aaa; line-height: 1.6; }
    #overlay .scores { font-size: 0.9rem; color: #ffcc00; margin: 6px 0; }
    #overlay .cta {
      margin-top: 12px;
      font-size: 0.85rem;
      color: #66ff66;
      letter-spacing: 0.08em;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.45; } }

    #hud {
      margin-top: 16px;
      display: flex;
      gap: 28px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: center;
    }

    .stat { text-align: center; }
    .stat .val { font-size: 1.4rem; color: #ffcc00; font-weight: bold; }
    .stat .lbl { font-size: 0.6rem; color: #555; text-transform: uppercase; letter-spacing: 0.1em; }

    #lives { font-size: 1.1rem; letter-spacing: 2px; min-height: 1.2em; }

    #message {
      margin-top: 14px;
      font-size: 0.85rem;
      color: #aaa;
      letter-spacing: 0.05em;
      min-height: 1.2em;
      text-align: center;
    }
    #message.correct { color: #66ff66; }
    #message.wrong   { color: #ff4444; }
    #message.hint    { color: #ffcc00; }

    #streak-bar { margin-top: 8px; display: flex; gap: 4px; }
    .streak-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #222;
      border: 1px solid #333;
      transition: background 0.2s;
    }
    .streak-dot.on { background: #ffcc00; border-color: #ffcc00; }

    #mute {
      position: fixed;
      top: 10px; right: 12px;
      background: none; border: 1px solid #333; color: #888;
      font-family: inherit; font-size: 0.7rem;
      padding: 4px 8px; border-radius: 4px; cursor: pointer;
    }
  </style>
</head>
<body>

<button id="mute" aria-label="Toggle sound">🔊 ON</button>

<h1>⛧ Bospider</h1>
<div id="info">← → select &nbsp;|&nbsp; ↓ / SPACE skip &nbsp;|&nbsp; mobile: swipe ← → to move, ↓ to skip</div>

<div id="arena" role="application" aria-label="Bospider game board">
  <div class="col-selector" id="selector"></div>
  <!-- bars injected here -->
  <div id="spider" aria-hidden="true">🕷</div>
  <!-- col labels injected -->
  <div id="overlay">
    <div class="big" id="ov-title">⛧ Bospider</div>
    <div class="sub" id="ov-sub">Read the board. Pick the column where<br>the spider lands. Survive, round after round.</div>
    <div class="scores" id="ov-scores"></div>
    <div class="cta" id="ov-cta">Press SPACE or TAP to start</div>
  </div>
</div>

<div id="lives" aria-label="Lives remaining">❤️ ❤️ ❤️</div>

<div id="hud">
  <div class="stat"><div class="val" id="round-val">1</div><div class="lbl">Round</div></div>
  <div class="stat"><div class="val" id="score-val">0</div><div class="lbl">Score</div></div>
  <div class="stat"><div class="val" id="best-val">0</div><div class="lbl">Best</div></div>
  <div class="stat"><div class="val" id="speed-val">—</div><div class="lbl">Speed</div></div>
</div>

<div id="message" role="status" aria-live="polite">Press start to play</div>

<div id="streak-bar" aria-hidden="true"></div>

<script src="src/logic.js"></script>
<script>
// ─── Constants (shared with the unit-tested logic module) ───────────────────────
const L = window.BospiderLogic;
const { COLS, ROWS, COL_W, ROW_H, ARENA_H, PAUSE_MS, BASE_MS, MIN_MS, STREAK_MAX, START_LIVES } = L.CONST;
const HS_KEY = 'bospider_highscore';

// ─── State ───────────────────────────────────────────────────────────────────
let round, score, streak, lives, selectedCol, spawnCol;
let bars          = [];        // [{row, gap}]
let phase         = 'start';   // start | choose | moving | result | gameover
let animId        = null;
let lastTs        = null;
let travelMs      = BASE_MS;
let elapsed       = 0;         // ms into descent
let path          = [];        // [{x,y}] waypoints
let segLen        = [];        // cumulative length up to each point
let totalLen      = 0;
let safeCol       = 0;
let pauseTimer    = null;
let resultTimer   = null;
let highScore     = 0;
let muted         = false;

// ─── DOM refs ────────────────────────────────────────────────────────────────
const arena     = document.getElementById('arena');
const spiderEl  = document.getElementById('spider');
const selector  = document.getElementById('selector');
const roundVal  = document.getElementById('round-val');
const scoreVal  = document.getElementById('score-val');
const bestVal   = document.getElementById('best-val');
const speedVal  = document.getElementById('speed-val');
const messageEl = document.getElementById('message');
const streakBar = document.getElementById('streak-bar');
const livesEl   = document.getElementById('lives');
const overlay   = document.getElementById('overlay');
const ovTitle   = document.getElementById('ov-title');
const ovSub     = document.getElementById('ov-sub');
const ovScores  = document.getElementById('ov-scores');
const ovCta     = document.getElementById('ov-cta');
const muteBtn   = document.getElementById('mute');

// ─── Audio (WebAudio, lazy) ────────────────────────────────────────────────────
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch (e) { audioCtx = null; }
  }
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
}
function beep(freq, dur, type = 'square', vol = 0.08) {
  if (muted || !audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = type;
  osc.frequency.setValueAtTime(freq, t);
  gain.gain.setValueAtTime(vol, t);
  gain.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + dur);
}
function sfxStep()  { beep(220, 0.05, 'square', 0.04); }
function sfxWin()   { beep(660, 0.09, 'triangle', 0.09); setTimeout(() => beep(990, 0.12, 'triangle', 0.09), 90); }
function sfxLose()  { beep(140, 0.25, 'sawtooth', 0.10); }
function sfxOver()  { beep(200, 0.2, 'sawtooth', 0.1); setTimeout(() => beep(120, 0.4, 'sawtooth', 0.1), 160); }

// ─── Helpers (logic delegated to the tested module) ─────────────────────────────
const colX = L.colX;
const travelMsForRound = L.travelMsForRound;
function rowsPerSecond() { return L.rowsPerSecond(travelMs); }

function loadHighScore() {
  try { highScore = parseInt(localStorage.getItem(HS_KEY), 10) || 0; }
  catch (e) { highScore = 0; }
}
function saveHighScore() {
  if (score > highScore) {
    highScore = score;
    try { localStorage.setItem(HS_KEY, String(highScore)); } catch (e) {}
  }
}

function buildStreakBar() {
  streakBar.innerHTML = '';
  for (let i = 0; i < STREAK_MAX; i++) {
    const d = document.createElement('div');
    d.className = 'streak-dot' + (i < streak ? ' on' : '');
    streakBar.appendChild(d);
  }
}
function renderLives() {
  livesEl.textContent = '❤️ '.repeat(lives).trim() || '—';
  livesEl.setAttribute('aria-label', lives + ' lives remaining');
}

// ─── Build round: bars, spider path (with lateral tracing) ─────────────────────
function generateRound() {
  arena.querySelectorAll('.bar, .path-trace').forEach(b => b.remove());

  spawnCol = Math.floor(Math.random() * COLS);
  bars = L.generateBars();

  // Render the bars.
  bars.forEach(({ row, gap }) => {
    const barEl = document.createElement('div');
    barEl.className = 'bar';
    // Bar bridges columns `gap` and `gap+1`; center it on their shared boundary so it
    // lines up exactly with the spider's lateral trace (center-to-center of the two cols).
    barEl.style.left = (gap * COL_W + COL_W / 2) + 'px';
    barEl.style.top  = (row * ROW_H + ROW_H / 2 - 3) + 'px';
    arena.appendChild(barEl);
  });

  // Build the traced polyline + arc-length + safe column (pure, unit-tested).
  const built = L.buildPath(spawnCol, bars);
  path = built.path;
  segLen = built.segLen;
  totalLen = built.totalLen;
  safeCol = built.safeCol;
}

function pointAtDistance(d) {
  return L.pointAtDistance(path, segLen, totalLen, d);
}

// Draw a green-glowing polyline over the spider's actual descent path.
function drawPathTrace() {
  arena.querySelectorAll('.path-trace').forEach(s => s.remove());
  for (let i = 0; i < path.length - 1; i++) {
    const a = path[i], b = path[i + 1];
    const dx = b.x - a.x, dy = b.y - a.y;
    const len = Math.hypot(dx, dy);
    if (len < 0.5) continue;
    const angle = Math.atan2(dy, dx) * 180 / Math.PI;
    const seg = document.createElement('div');
    seg.className = 'path-trace';
    seg.style.left = a.x + 'px';
    seg.style.top  = (a.y - 2) + 'px';   // center the 4px line on the path
    seg.style.width = len + 'px';
    seg.style.transform = 'rotate(' + angle + 'deg)';
    seg.style.animationDelay = (i * 0.03) + 's';   // draw on, segment by segment
    arena.appendChild(seg);
  }
}

// ─── Render ────────────────────────────────────────────────────────────────────
function renderSpiderAt(x, y) {
  spiderEl.style.left = x + 'px';
  spiderEl.style.top  = (y - 18) + 'px';
}
function renderSelector() {
  selector.style.left = (selectedCol * COL_W) + 'px';
  if (phase === 'result') {
    selector.className = 'col-selector ' + (selectedCol === safeCol ? 'safe' : 'danger');
  } else {
    selector.className = 'col-selector';
  }
}
function updateHud() {
  roundVal.textContent = round;
  scoreVal.textContent = score;
  bestVal.textContent  = Math.max(highScore, score);
  speedVal.textContent = rowsPerSecond().toFixed(1) + '/s';
  buildStreakBar();
  renderLives();
}
function setMessage(text, cls) {
  messageEl.textContent = text;
  messageEl.className = cls || '';
}

// ─── Game flow ──────────────────────────────────────────────────────────────────
function startGame() {
  ensureAudio();
  round = 1; score = 0; streak = 0; lives = START_LIVES;
  selectedCol = 0;
  overlay.classList.add('hidden');
  startRound();
}

function startRound() {
  clearTimeout(pauseTimer);
  phase = 'choose';
  travelMs = travelMsForRound(round);
  elapsed = 0;
  generateRound();
  renderSpiderAt(path[0].x, path[0].y);
  renderSelector();
  updateHud();
  setMessage('Choose your column!', '');
  pauseTimer = setTimeout(() => { if (phase === 'choose') beginMoving(); }, PAUSE_MS);
}

function beginMoving() {
  clearTimeout(pauseTimer);
  phase = 'moving';
  lastTs = null;
  elapsed = 0;
  setMessage('↓ descending…', 'hint');
  animId = requestAnimationFrame(tick);
}

let lastStepRow = -1;
function tick(ts) {
  if (phase !== 'moving') return;
  if (lastTs === null) { lastTs = ts; lastStepRow = -1; }
  const dt = ts - lastTs;
  lastTs = ts;

  elapsed += dt;
  const frac = Math.min(elapsed / travelMs, 1);
  const d = frac * totalLen;
  const p = pointAtDistance(d);
  renderSpiderAt(p.x, p.y);

  // step blip as the spider passes each row
  const curRow = Math.floor(p.y / ROW_H);
  if (curRow !== lastStepRow && curRow < ROWS) { lastStepRow = curRow; sfxStep(); }

  if (frac >= 1) { endRound(); return; }
  animId = requestAnimationFrame(tick);
}

// Skip resolves the round immediately — works while choosing OR mid-descent.
function skipWait() {
  if (phase !== 'choose' && phase !== 'moving') return;
  clearTimeout(pauseTimer);
  cancelAnimationFrame(animId);
  const end = path[path.length - 1];   // snap the spider to its landing spot
  renderSpiderAt(end.x, end.y);
  endRound();
}

function endRound() {
  phase = 'result';
  cancelAnimationFrame(animId);
  drawPathTrace();   // reveal the spider's route with a green glow

  const correct = selectedCol === safeCol;
  const result = L.scoreForResult(correct, streak);
  streak = result.streak;
  if (correct) {
    score += result.gained;
    const bonus = result.gained / 100;
    setMessage(`✓ Safe! +${result.gained} pts${bonus > 1 ? ' (×' + bonus + ' streak)' : ''}`, 'correct');
    sfxWin();
  } else {
    lives--;
    setMessage(`✗ Crushed! Safe was column ${safeCol + 1}. ${lives} ${lives === 1 ? 'life' : 'lives'} left.`, 'wrong');
    sfxLose();
  }

  saveHighScore();
  renderSelector();
  updateHud();

  if (lives <= 0) {
    resultTimer = setTimeout(gameOver, 1400);
    return;
  }
  resultTimer = setTimeout(() => { round++; startRound(); }, 1600);
}

function gameOver() {
  phase = 'gameover';
  saveHighScore();
  const isRecord = score >= highScore && score > 0;
  ovTitle.textContent = '☠ Game Over';
  ovTitle.style.color = '#ff4444';
  ovSub.innerHTML = `You survived to round <b>${round}</b>.`;
  ovScores.innerHTML = `Score <b>${score}</b> &nbsp;·&nbsp; Best <b>${highScore}</b>` +
                       (isRecord ? '<br><span style="color:#66ff66">★ New best!</span>' : '');
  ovCta.textContent = 'Press SPACE or TAP to retry';
  overlay.classList.remove('hidden');
  setMessage('Game over', 'wrong');
  sfxOver();
}

// ─── Input ──────────────────────────────────────────────────────────────────────
// The player can re-aim while choosing AND while the spider is still crawling;
// the landing column is judged at the moment the spider reaches the floor.
function canMove() { return phase === 'choose' || phase === 'moving'; }
function moveSelector(dir) {
  if (!canMove()) return;
  selectedCol = (selectedCol + dir + COLS) % COLS;
  renderSelector();
}

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowLeft')  { if (canMove()) moveSelector(-1); }
  else if (e.key === 'ArrowRight') { if (canMove()) moveSelector(1); }
  else if (e.key === 'ArrowDown') { e.preventDefault(); skipWait(); }   // ↓ skips, like swipe-down
  else if (e.key === ' ' || e.key === 'Enter') {
    e.preventDefault();
    ensureAudio();
    if (phase === 'start' || phase === 'gameover') startGame();
    else skipWait();   // choose or moving → resolve now
  }
});

// ── Touch / pointer: swipe ← → to move, ↓ to skip; tap to start/retry ──────────
const SWIPE_MIN = 24;   // px before a drag counts as a swipe
let swipeStart = null;

arena.addEventListener('pointerdown', e => {
  ensureAudio();
  swipeStart = { x: e.clientX, y: e.clientY };
  if (arena.setPointerCapture) { try { arena.setPointerCapture(e.pointerId); } catch (_) {} }
});

arena.addEventListener('pointerup', e => {
  if (!swipeStart) return;
  const dx = e.clientX - swipeStart.x;
  const dy = e.clientY - swipeStart.y;
  swipeStart = null;
  const adx = Math.abs(dx), ady = Math.abs(dy);

  // Tap (no real movement): start or retry.
  if (adx < SWIPE_MIN && ady < SWIPE_MIN) {
    if (phase === 'start' || phase === 'gameover') startGame();
    return;
  }
  // A swipe on a menu screen also just starts.
  if (phase === 'start' || phase === 'gameover') { startGame(); return; }

  if (adx > ady) {
    if (canMove()) moveSelector(dx > 0 ? 1 : -1);   // horizontal swipe → move (even while crawling)
  } else if (dy > 0) {
    skipWait();                                     // swipe down → resolve now (choose or mid-descent)
  }
});

arena.addEventListener('pointercancel', () => { swipeStart = null; });

muteBtn.addEventListener('click', () => {
  muted = !muted;
  muteBtn.textContent = muted ? '🔇 OFF' : '🔊 ON';
});

// ─── Boot ─────────────────────────────────────────────────────────────────────
for (let c = 0; c < COLS; c++) {
  // 10px vertical rail centered on the column (prepended so bars/spider sit on top).
  const track = document.createElement('div');
  track.className = 'col-track';
  track.style.left = colX(c) + 'px';
  arena.prepend(track);

  const lbl = document.createElement('div');
  lbl.className = 'col-label';
  lbl.style.left = (c * COL_W) + 'px';
  lbl.textContent = c + 1;
  arena.appendChild(lbl);
}

loadHighScore();
round = 1; score = 0; streak = 0; lives = START_LIVES; selectedCol = 0;
updateHud();
ovScores.innerHTML = highScore > 0 ? `Best <b>${highScore}</b>` : '';
renderSpiderAt(colX(0), 0);
</script>
</body>
</html>
